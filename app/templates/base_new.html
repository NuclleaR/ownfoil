<!doctype html>
<html lang="en" data-theme="sunset">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% if title %}
    <title>Ownfoil | {{title}}</title>
    {%else%}
    <title>Ownfoil</title>
    {%endif%}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <script src="{{ url_for('static', filename='js/filters.js') }}"></script>
    <script src="{{ url_for('static', filename='js/games.js') }}"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon/favicon-96x96.png"
        sizes="96x96') }}" />
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon/favicon.svg') }}" />
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}" />
    <link rel="apple-touch-icon" sizes="180x180"
        href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}" />
    <meta name="apple-mobile-web-app-title" content="Ownfoil" />
    <link rel="manifest" href="{{ url_for('static', filename='favicon/site.webmanifest') }}" />
</head>

<body>
    {% block content %}
    {% endblock %}
</body>

</html>
