<div x-data class="flex flex-wrap gap-4 items-center justify-center py-4">

    <!-- Filter dropdown -->
    <div class="dropdown" x-bind="Dropdown">
        <div role="button" class="btn btn-primary" x-bind="DropdownTrigger">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 16 16">
                <path
                    d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .389.812L9.5 8.343V14.5a.5.5 0 0 1-.724.447l-2-1A.5.5 0 0 1 6.5 13.5v-5.157L1.611 1.812A.5.5 0 0 1 1.5 1.5z" />
            </svg>
            Filters
        </div>
        <div class="dropdown-content bg-base-200 rounded-box z-1 mt-2 w-72 p-4 shadow-lg space-y-4">

            <!-- Type filter -->
            <div>
                <div class="text-sm font-semibold mb-1">Type</div>
                <div class="join w-full">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="typeFilter" aria-label="All"
                        :checked="$store.filters.type === ''" @click="$store.filters.setType('')">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="typeFilter" aria-label="Base"
                        :checked="$store.filters.type === 'BASE'" @click="$store.filters.setType('BASE')">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="typeFilter" aria-label="DLC"
                        :checked="$store.filters.type === 'DLC'" @click="$store.filters.setType('DLC')">
                </div>
            </div>

            <div class="divider my-0"></div>

            <!-- Ownership filter -->
            <div>
                <div class="text-sm font-semibold mb-1">Ownership</div>
                <div class="join w-full">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="ownershipFilter" aria-label="All"
                        :checked="$store.filters.ownership === ''" @click="$store.filters.setOwnership('')">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="ownershipFilter" aria-label="Owned"
                        :checked="$store.filters.ownership === 'Owned'" @click="$store.filters.setOwnership('Owned')">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="ownershipFilter" aria-label="Missing"
                        :checked="$store.filters.ownership === 'Missing'"
                        @click="$store.filters.setOwnership('Missing')">
                </div>
            </div>

            <div class="divider my-0"></div>

            <!-- Update filter -->
            <div>
                <div class="text-sm font-semibold mb-1">Update</div>
                <div class="join w-full">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="updateFilter" aria-label="All"
                        :checked="$store.filters.update === ''" @click="$store.filters.setUpdate('')">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="updateFilter" aria-label="Up to date"
                        :checked="$store.filters.update === 'Up to date'"
                        @click="$store.filters.setUpdate('Up to date')">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="updateFilter"
                        aria-label="Missing Update" :checked="$store.filters.update === 'Outdated'"
                        @click="$store.filters.setUpdate('Outdated')">
                </div>
            </div>

            <div class="divider my-0"></div>

            <!-- Completion filter -->
            <div>
                <div class="text-sm font-semibold mb-1">DLC Completion</div>
                <div class="join w-full">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="completionFilter" aria-label="All"
                        :checked="$store.filters.completion === ''" @click="$store.filters.setCompletion('')">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="completionFilter"
                        aria-label="Complete" :checked="$store.filters.completion === 'Complete'"
                        @click="$store.filters.setCompletion('Complete')">
                    <input class="join-item btn btn-sm flex-1" type="radio" name="completionFilter"
                        aria-label="Missing DLC" :checked="$store.filters.completion === 'Missing DLC'"
                        @click="$store.filters.setCompletion('Missing DLC')">
                </div>
            </div>

        </div>
    </div>

    <!-- Search -->
    <input type="text" class="input input-bordered w-64" placeholder="Search titles..." :value="$store.filters.search"
        @input.debounce.300ms="$store.filters.setSearch($event.target.value)">

    <!-- View toggle -->
    <div class="join">
        <button class="join-item btn" :class="$store.games.currentView === 'card' ? 'btn-primary' : 'btn-outline'"
            @click="$store.games.setView('card')">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 16 16">
                <path
                    d="M0 1a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1zm9 0a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-5a1 1 0 0 1-1-1V1zm0 9a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-5a1 1 0 0 1-1-1v-5z" />
            </svg>
        </button>
        <button class="join-item btn" :class="$store.games.currentView === 'icon' ? 'btn-primary' : 'btn-outline'"
            @click="$store.games.setView('icon')">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 16 16">
                <path
                    d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3zm8 0A1.5 1.5 0 0 1 10.5 9h3a1.5 1.5 0 0 1 1.5 1.5v3a1.5 1.5 0 0 1-1.5 1.5h-3A1.5 1.5 0 0 1 9 13.5v-3z" />
            </svg>
        </button>
    </div>

    <!-- Items per page -->
    <div class="join">
        <input type="number" class="join-item input input-bordered flex-1" min="1" max="100"
            :value="$store.games.itemsPerPage"
            @change="$store.games.setItemsPerPage(parseInt($event.target.value) || 12)">
        <!-- Card size -->
        <select class="select select-primary join-item flex-1" @change="$store.games.setCardSize($event.target.value)">
            <template x-for="(size, i) in $store.games.cardSizes" :key="i">
                <option :value="i" :selected="i === $store.games.cardSize" x-text="size + 'px'"></option>
            </template>
        </select>
    </div>
</div>
