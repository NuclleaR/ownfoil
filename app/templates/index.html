{% extends "base_new.html" %}

{% block content %}
{% include 'nav.html' %}
<div x-data x-init="$store.games.fetch()" class="container mx-auto">

    {% include 'filters.html' %}

    <!-- Card View -->
    <template x-if="$store.games.currentView === 'card'">
        <div class="grid gap-4 p-4"
            :style="'grid-template-columns: repeat(auto-fill, minmax(' + $store.games.cardSizePx + 'px, 1fr))'">
            <template x-for="game in $store.games.paginatedGames" :key="game.id">
                <div class="card bg-base-200 shadow-md overflow-hidden relative">
                    <figure class="relative">
                        <img :src="game.bannerUrl" :alt="game.title_id_name || game.name"
                            class="w-full h-48 object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-base-300/90 to-transparent"></div>
                    </figure>
                    <div class="absolute bottom-0 left-0 right-0 p-3">
                        <h3 class="font-bold text-sm text-base-content" x-text="game.title_id_name || game.name"></h3>
                        <p class="text-xs opacity-70">
                            <template x-if="game.app_type === 'DLC'">
                                <span x-text="game.name + ' | '"></span>
                            </template>
                            <span x-text="game.id"></span>
                        </p>
                        <div class="flex gap-1 mt-1">
                            <span class="badge badge-sm" :class="game.owned ? 'badge-info' : 'badge-warning'"
                                x-text="game.app_type"></span>
                            <template x-if="game.has_latest_version !== undefined">
                                <span class="badge badge-sm"
                                    :class="game.has_latest_version ? 'badge-success' : 'badge-warning'"
                                    x-text="game.has_latest_version ? '✓' : '↓'"></span>
                            </template>
                            <template x-if="game.has_all_dlcs !== undefined">
                                <span class="badge badge-sm"
                                    :class="game.has_all_dlcs ? 'badge-success' : 'badge-warning'"
                                    x-text="game.has_all_dlcs ? 'DLC ✓' : 'DLC !'"></span>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <!-- Icon View -->
    <template x-if="$store.games.currentView === 'icon'">
        <div class="flex max-sm:flex-col flex-wrap gap-4 p-4 justify-center">
            <template x-for="game in $store.games.paginatedGames" :key="game.id">
                <div class="flex sm:flex-col max-sm:gap-4 items-center max-sm:!w-auto"
                    :style="'width: ' + $store.games.cardSizePx + 'px;'">
                    <img :src="game.iconUrl" :alt="game.name" class="rounded w-full"
                        :style="'height: ' + $store.games.cardSizePx + 'px; object-fit: cover; width: ' + $store.games.cardSizePx + 'px;'">
                    <span class="sm:text-center w-full mt-1"
                        :style="'font-size: ' + Math.round(16 + ($store.games.cardSizePx - 64) / (312 - 64) * 8) + 'px'"
                        x-text="game.title_id_name || game.name"></span>
                </div>
            </template>
        </div>
    </template>

    <!-- Pagination -->
    <div class="flex justify-center py-4">
        <div class="join">
            <button class="join-item btn btn-sm" :disabled="$store.games.currentPage === 1"
                @click="$store.games.prevPage()">«</button>
            <template x-for="page in $store.games.totalPages" :key="page">
                <button class="join-item btn btn-sm" :class="page === $store.games.currentPage ? 'btn-active' : ''"
                    @click="$store.games.setPage(page)" x-text="page"></button>
            </template>
            <button class="join-item btn btn-sm" :disabled="$store.games.currentPage === $store.games.totalPages"
                @click="$store.games.nextPage()">»</button>
        </div>
    </div>

</div>
{% endblock %}
